<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Mock Content Background -->
<div class="flex-1 px-6 pt-12 opacity-40">
<h1 class="font-headline text-4xl mb-4 text-primary">Daily Overview</h1>
<div class="bg-surface-container-lowest h-32 rounded-lg mb-4"></div>

</div>
<!-- Bottom Sheet Overlay (Dimmer) -->

<div class="fixed bottom-0 left-0 right-0 h-[618px] bg-surface-container-lowest rounded-t-xl editorial-shadow z-50 flex flex-col overflow-hidden">

<div class="w-full flex justify-center py-4">
<div class="w-12 h-1.5 bg-surface-variant rounded-full"></div>
</div>

<p class="font-body text-on-surface-variant text-sm mt-1">Capture a new vital measurement for the family.</p>
</header>
<!-- Record Type Selection -->
<div class="px-8 mb-8">
<div class="flex items-center gap-3 overflow-x-auto pb-2 no-scrollbar">
<!-- Edit Action -->
<button class="flex-shrink-0 w-12 h-12 rounded-full bg-surface-container-high text-primary flex items-center justify-center transition-all active:scale-90 hover:bg-surface-variant">
<span class="material-symbols-outlined text-xl" data-icon="edit">edit</span>
</button>
<!-- Pill Options -->
<button class="flex-shrink-0 px-6 py-3 rounded-full bg-primary text-on-primary font-medium flex items-center gap-2 transition-all active:scale-95 shadow-sm">
<span class="material-symbols-outlined text-lg" data-icon="device_thermostat">device_thermostat</span>
<span>Temperature</span>
</button>
<button class="flex-shrink-0 px-6 py-3 rounded-full bg-surface-container-high text-on-surface-variant font-medium flex items-center gap-2 transition-all active:scale-95 hover:bg-surface-variant">
<span class="material-symbols-outlined text-lg" data-icon="monitor_weight">monitor_weight</span>
<span>Weight</span>
</button>
<button class="flex-shrink-0 px-6 py-3 rounded-full bg-surface-container-high text-on-surface-variant font-medium flex items-center gap-2 transition-all active:scale-95 hover:bg-surface-variant">
<span class="material-symbols-outlined text-lg" data-icon="barcode_scanner">barcode_scanner</span>
<span>Scan</span>
</button>
<!-- Placeholder/Add Slot (Visually shown as if in "Edit" state) -->
<button class="flex-shrink-0 w-12 h-12 rounded-full border-2 border-dashed border-outline-variant flex items-center justify-center text-outline-variant">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>

<div class="px-8 relative mb-10 text-center">
<div class="inline-block relative">
<span class="font-headline text-7xl font-bold text-primary tracking-tight">101.2</span>
<span class="text-3xl font-body text-on-primary-container font-medium absolute -right-10 top-2">°F</span>
</div>
<div class="h-1 w-24 bg-primary-container/30 mx-auto mt-2 rounded-full"></div>
</div>

<button class="h-16 rounded-lg bg-surface-container-low text-on-surface text-2xl font-semibold active:bg-primary-container transition-colors">1</button>

</button>

<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</div>
