<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Join the Sanctuary | Teal Care</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,600&family=Outfit:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-surface": "#161d1c",
          "background": "#f4fbf9",
          "on-primary-container": "#00433f",
          "error": "#ba1a1a",
          "surface-bright": "#f4fbf9",
          "secondary-container": "#abf4ac",
          "secondary": "#286b33",
          "outline": "#6d7a77",
          "surface-container-highest": "#dde4e2",
          "primary-container": "#4db6ac",
          "tertiary": "#94492d",
          "surface-variant": "#dde4e2",
          "primary": "#006a63",
          "primary-fixed-dim": "#71d7cd",
          "surface-container-low": "#eef5f3",
          "surface-container": "#e8efed",
          "on-background": "#161d1c",
          "inverse-primary": "#71d7cd",
          "primary-fixed": "#8ef4e9",
          "surface-container-lowest": "#ffffff",
          "surface": "#f4fbf9",
          "on-primary": "#ffffff",
          "on-surface-variant": "#3d4947",
          "inverse-on-surface": "#ebf2f0",
          "on-secondary": "#ffffff",
          "error-container": "#ffdad6",
          "surface-container-high": "#e3eae8",
          "inverse-surface": "#2b3231",
          "surface-dim": "#d4dbda",
          "outline-variant": "#bdc9c6",
          "on-tertiary": "#ffffff",
          "surface-tint": "#006a63"
        },
        fontFamily: {
          "headline": ["Fraunces", "serif"],
          "body": ["Outfit", "sans-serif"],
          "label": ["Outfit", "sans-serif"]
        },
        borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" }
      }
    }
  }
</script>
<style>
  body {
    font-family: 'Outfit', sans-serif;
    min-height: max(884px, 100dvh);
    background-color: #f4fbf9;
    color: #161d1c;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { font-family: 'Fraunces', serif; }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block;
    line-height: 1;
  }
  .ambient-shadow {
    box-shadow: 0 40px 60px -20px rgba(22, 29, 28, 0.05);
  }
  .gradient-cta {
    background: linear-gradient(135deg, #006a63 0%, #4db6ac 100%);
  }
  .input-row:focus-within {
    box-shadow: 0 2px 0 0 #006a63;
  }
  .blob-1 {
    background: radial-gradient(ellipse, rgba(77,182,172,0.16) 0%, transparent 70%);
  }
  .blob-2 {
    background: radial-gradient(ellipse, rgba(40,107,51,0.08) 0%, transparent 70%);
  }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="bg-background text-on-surface">

<!-- Background organic blobs -->
<div class="fixed inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
  <div class="blob-2 absolute -top-16 -left-20 w-72 h-72 rounded-full"></div>
  <div class="blob-1 absolute top-1/3 -right-28 w-80 h-80 rounded-full"></div>
  <div class="blob-1 absolute -bottom-20 left-4 w-60 h-60 rounded-full"></div>
</div>

<!-- Sticky header with back nav -->
<header class="sticky top-0 z-50 flex items-center justify-between px-6 py-4 bg-[#f4fbf9]/80 backdrop-blur-[20px]">
  <a href="../sign_in/code.html" aria-label="Back to sign in" class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest active:scale-90 transition-all">
    <span class="material-symbols-outlined text-on-surface-variant text-[22px]">arrow_back</span>
  </a>
  <div class="flex items-center gap-2">
    <span class="w-7 h-7 rounded-lg gradient-cta flex items-center justify-center">
      <span class="material-symbols-outlined text-white text-[16px]">favorite</span>
    </span>
    <span class="font-headline italic text-2xl text-primary tracking-tight">Teal Care</span>
  </div>
  <!-- Spacer to center brand -->
  <div class="w-10"></div>
</header>

<main class="relative flex flex-col px-6 pt-6 pb-12">

  <!-- Hero copy -->
  <section class="mb-8">
    <h1 class="font-headline font-semibold text-[2rem] leading-tight text-on-surface tracking-tight">
      Begin your<br/>
      <span class="text-primary italic">health journey.</span>
    </h1>
    <p class="mt-3 text-on-surface-variant font-body text-base leading-relaxed">
      Create your family sanctuary in seconds.
    </p>
  </section>

  <!-- Registration Form Card -->
  <section class="bg-surface-container-lowest rounded-lg ambient-shadow p-6">
    <form class="space-y-5" novalidate>

      <!-- Full Name -->
      <div class="space-y-2">
        <label class="text-xs font-label font-medium text-on-surface-variant tracking-wide uppercase ml-1" for="full_name">
          Full Name
        </label>
        <div class="relative flex items-center bg-surface-container-high rounded-DEFAULT input-row transition-all">
          <span class="material-symbols-outlined absolute left-4 text-[18px] text-primary pointer-events-none">person</span>
          <input
            id="full_name"
            type="text"
            placeholder="Evelyn Thorne"
            autocomplete="name"
            class="w-full bg-transparent border-none rounded-DEFAULT py-4 pl-12 pr-4 focus:ring-0 text-on-surface placeholder:text-outline font-body text-base outline-none"
          />
        </div>
      </div>

      <!-- Email -->
      <div class="space-y-2">
        <label class="text-xs font-label font-medium text-on-surface-variant tracking-wide uppercase ml-1" for="email">
          Email Address
        </label>
        <div class="relative flex items-center bg-surface-container-high rounded-DEFAULT input-row transition-all">
          <span class="material-symbols-outlined absolute left-4 text-[18px] text-primary pointer-events-none">mail</span>
          <input
            id="email"
            type="email"
            placeholder="evelyn@example.com"
            autocomplete="email"
            class="w-full bg-transparent border-none rounded-DEFAULT py-4 pl-12 pr-4 focus:ring-0 text-on-surface placeholder:text-outline font-body text-base outline-none"
          />
        </div>
      </div>

      <!-- Phone Number -->
      <div class="space-y-2">
        <label class="text-xs font-label font-medium text-on-surface-variant tracking-wide uppercase ml-1" for="phone">
          Phone Number
        </label>
        <div class="relative flex items-center bg-surface-container-high rounded-DEFAULT input-row transition-all">
          <div class="absolute left-4 flex items-center gap-2 pointer-events-none">
            <span class="material-symbols-outlined text-[18px] text-primary">call</span>
            <span class="text-sm font-label font-medium text-on-surface">+1</span>
            <div class="w-px h-4 bg-outline-variant"></div>
          </div>
          <input
            id="phone"
            type="tel"
            placeholder="(555) 000-0000"
            autocomplete="tel"
            class="w-full bg-transparent border-none rounded-DEFAULT py-4 pl-20 pr-4 focus:ring-0 text-on-surface placeholder:text-outline font-body text-base outline-none"
          />
        </div>
      </div>

      <!-- Date of Birth -->
      <div class="space-y-2">
        <label class="text-xs font-label font-medium text-on-surface-variant tracking-wide uppercase ml-1" for="dob">
          Date of Birth
        </label>
        <div class="relative flex items-center bg-surface-container-high rounded-DEFAULT input-row transition-all">
          <span class="material-symbols-outlined absolute left-4 text-[18px] text-primary pointer-events-none">cake</span>
          <input
            id="dob"
            type="date"
            class="w-full bg-transparent border-none rounded-DEFAULT py-4 pl-12 pr-4 focus:ring-0 text-on-surface font-body text-base outline-none"
          />
        </div>
      </div>

      <!-- Terms note -->
      <p class="text-[11px] font-label text-outline leading-relaxed px-1">
        By creating an account you agree to our
        <a href="#" class="text-primary underline underline-offset-2">Terms of Service</a>
        and
        <a href="#" class="text-primary underline underline-offset-2">Privacy Policy</a>.
      </p>

      <!-- CTA -->
      <button
        type="submit"
        class="gradient-cta w-full py-4 px-6 rounded-xl font-label font-semibold text-base text-on-primary tracking-wide hover:opacity-95 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 mt-2"
        style="box-shadow: 0 8px 24px rgba(0,106,99,0.22)"
      >
        <span>Create Account &amp; Get OTP</span>
        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
      </button>
    </form>
  </section>

  <!-- Divider -->
  <div class="relative flex items-center my-7">
    <div class="flex-grow h-px bg-surface-container-highest"></div>
    <span class="flex-shrink mx-4 text-[11px] font-label text-outline uppercase tracking-[0.2em]">or continue with</span>
    <div class="flex-grow h-px bg-surface-container-highest"></div>
  </div>

  <!-- Social Logins -->
  <div class="flex justify-center gap-4">
    <!-- Google -->
    <button aria-label="Sign up with Google" class="w-16 h-16 rounded-lg bg-surface-container-lowest ambient-shadow flex items-center justify-center hover:bg-surface-container-low active:scale-90 transition-all">
      <svg class="w-6 h-6" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
    </button>
    <!-- Apple -->
    <button aria-label="Sign up with Apple" class="w-16 h-16 rounded-lg bg-surface-container-lowest ambient-shadow flex items-center justify-center hover:bg-surface-container-low active:scale-90 transition-all">
      <svg class="w-6 h-6 text-on-surface" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701z"/>
      </svg>
    </button>
    <!-- Facebook -->
    <button aria-label="Sign up with Facebook" class="w-16 h-16 rounded-lg bg-surface-container-lowest ambient-shadow flex items-center justify-center hover:bg-surface-container-low active:scale-90 transition-all">
      <svg class="w-6 h-6 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24">
        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
      </svg>
    </button>
  </div>

  <!-- Sign In link -->
  <footer class="mt-10 text-center">
    <p class="text-on-surface-variant font-body text-sm">
      Already have an account?
      <a href="../sign_in/code.html" class="text-primary font-semibold ml-1 hover:underline underline-offset-2 transition-all">Sign In</a>
    </p>
  </footer>

</main>
</body>
</html>
